<!DOCTYPE html>
<html>
<head>
    <title>Create Placement Drive</title>
</head>
<body>
    <h2>Create Placement Drive</h2>

    <form method="POST">
        <label>Job Title:</label><br>
        <input type="text" name="job_title" required><br><br>

        <label>Job Description:</label><br>
        <textarea name="job_description" required></textarea><br><br>

        <label>Eligibility:</label><br>
        <input type="text" name="eligibility"><br><br>

        <label>Package:</label><br>
        <input type="text" name="package"><br><br>

        <label>Location:</label><br>
        <input type="text" name="location"><br><br>

        <label>Application Deadline:</label><br>
        <input type="date" name="deadline" required><br><br>

        <button type="submit">Create Drive</button>
    </form>
</body>
</html>
